<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Commandes</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
<div id="admin-wrapper" class="admin-layout">
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="sidebar-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title"><h1>Commandes</h1><p>Gérez et suivez toutes les commandes</p></div>
      <div class="topbar-actions"><button class="theme-toggle"></button><button class="btn-outline" onclick="loadOrders()">Actualiser</button></div>
    </div>
    <div class="admin-content">
      <!-- Status tabs -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px">
        <button class="filter-btn active" onclick="filterByStatus('',this)">Toutes</button>
        <button class="filter-btn" onclick="filterByStatus('pending',this)" style="border-color:#E65100;color:#E65100">En attente</button>
        <button class="filter-btn" onclick="filterByStatus('confirmed',this)" style="border-color:var(--green);color:var(--green)">Confirmées</button>
        <button class="filter-btn" onclick="filterByStatus('preparing',this)" style="border-color:#1565C0;color:#1565C0">En préparation</button>
        <button class="filter-btn" onclick="filterByStatus('ready',this)" style="border-color:#6A1B9A;color:#6A1B9A">Prêtes</button>
        <button class="filter-btn" onclick="filterByStatus('delivered',this)" style="border-color:var(--green-dark);color:var(--green-dark)">Livrées</button>
        <button class="filter-btn" onclick="filterByStatus('cancelled',this)" style="border-color:#E53935;color:#E53935">Annulées</button>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h3>Liste des commandes (<span id="order-count">0</span>)</h3>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead>
              <tr><th>Réf.</th><th>Client</th><th>Plats</th><th>Total</th><th>Paiement</th><th>Statut</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody id="orders-table">
              <tr><td colspan="8" style="text-align:center;padding:40px"><div class="loader" style="margin:0 auto;border-color:var(--green-pale);border-top-color:var(--green)"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Order detail modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="max-width:560px" id="order-modal-content"></div>
</div>

<div class="toast-container"></div>
<script src="../../js/app.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
  const hostname = window.location.hostname || 'localhost';
  const BASE = (window.location.protocol === 'https:' || window.location.protocol === 'http:')
    ? `${window.location.protocol}//${hostname}:5000`
    : `http://${hostname}:5000`;
  let allOrders = [];
  let currentStatus = '';

  const statusLabels = { pending:'En attente', confirmed:'Confirmé', preparing:'En préparation', ready:'Prêt', delivered:'Livré', cancelled:'Annulé' };
  const statusClass = { pending:'status-pending', confirmed:'status-confirmed', preparing:'status-preparing', ready:'status-ready', delivered:'status-delivered', cancelled:'status-cancelled' };
  const payLabels = { wave:'Wave CI', orange:'Orange Money', moov:'Moov Money' };

  initAdminLayout('orders');
  loadOrders();

  async function loadOrders() {
    try {
      allOrders = await apiFetch('/orders/admin/all');
      filterByStatus(currentStatus, null);
    } catch(e) {
      console.error('Orders load error:', e);
      showToast(e.message || 'Erreur chargement', 'error');
    }
  }

  function filterByStatus(status, btn) {
    currentStatus = status;
    if (btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const filtered = status ? allOrders.filter(o => o.status === status) : allOrders;
    document.getElementById('order-count').textContent = filtered.length;
    renderTable(filtered);
  }

  function renderTable(orders) {
    const tbody = document.getElementById('orders-table');
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray)">Aucune commande</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => `<tr>
      <td style="font-family:monospace;font-weight:700;font-size:12px">#${o._id.slice(-8).toUpperCase()}</td>
      <td>
        <strong>${o.customerName}</strong><br>
        <span style="font-size:12px;color:var(--gray)">${o.customerPhone}</span>
      </td>
      <td style="font-size:13px">${o.items.slice(0,2).map(i=>`${i.name} x${i.quantity}`).join(', ')}${o.items.length>2?` +${o.items.length-2} autre(s)`:''}</td>
      <td style="font-weight:800;color:var(--green-dark)">${Number(o.totalAmount || 0).toLocaleString()} FCFA</td>
      <td>
        <span style="font-size:12px;font-weight:700">${payLabels[o.paymentMethod]||o.paymentMethod}</span><br>
        <span style="font-size:11px;color:var(--gray)">${o.paymentNumber||''}</span>
      </td>
      <td><span class="status-badge ${statusClass[o.status]||''}">${statusLabels[o.status]||o.status}</span></td>
      <td style="font-size:12px;color:var(--gray)">${new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
      <td class="table-actions">
        <button class="btn-sm btn-sm-edit" onclick="openDetail('${o._id}')">Détail</button>
        <select onchange="updateStatus('${o._id}',this.value);this.value=''" style="padding:4px 6px;border-radius:6px;border:1px solid var(--gray-pale);font-size:12px;cursor:pointer">
          <option value="">Changer statut</option>
          <option value="confirmed">Confirmer</option>
          <option value="preparing">En préparation</option>
          <option value="ready">Prêt</option>
          <option value="delivered">Livré</option>
          <option value="cancelled">Annuler</option>
        </select>
      </td>
    </tr>`).join('');
  }

  function openDetail(id) {
    const o = allOrders.find(x => x._id === id);
    if (!o) return;
    document.getElementById('order-modal-content').innerHTML = `
      <button class="modal-close" onclick="document.getElementById('order-modal').classList.remove('open')">&#10005;</button>
      <h3 style="margin-bottom:20px">Commande #${o._id.slice(-8).toUpperCase()}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div style="background:var(--gray-pale);padding:12px;border-radius:8px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:4px">CLIENT</p>
          <p style="font-weight:700">${o.customerName}</p>
          <p style="font-size:13px;color:var(--gray)">${o.customerPhone}</p>
          ${o.customerEmail?`<p style="font-size:13px;color:var(--gray)">${o.customerEmail}</p>`:''}
        </div>
        <div style="background:var(--gray-pale);padding:12px;border-radius:8px">
          <p style="font-size:11px;color:var(--gray);margin-bottom:4px">PAIEMENT</p>
          <p style="font-weight:700">${payLabels[o.paymentMethod]||o.paymentMethod}</p>
          <p style="font-size:13px;color:var(--gray)">Numéro: ${o.paymentNumber||'N/A'}</p>
          <span class="status-badge ${statusClass[o.status]||''}" style="margin-top:6px;display:inline-block">${statusLabels[o.status]||o.status}</span>
        </div>
      </div>
      <h4 style="margin-bottom:12px">Plats commandés</h4>
      ${o.items.map(i => {
        const imgSrc = i.image ? (i.image.startsWith('http') ? i.image : `${BASE}${i.image}`) : '../../images/placeholder.jpg';
        return `<div style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-pale);font-size:14px">
          <img src="${imgSrc}" alt="${i.name}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;flex-shrink:0" onerror="this.src='../../images/placeholder.jpg'">
          <div style="flex:1">
            <div style="font-weight:700">${i.name} x${i.quantity}</div>
            <div style="font-size:13px;color:var(--gray);margin-top:6px">${(i.price*i.quantity).toLocaleString()} FCFA</div>
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:2px solid var(--gold)">
        <strong style="font-size:16px">Total</strong>
        <strong style="font-size:20px;color:var(--green-dark)">${Number(o.totalAmount || 0).toLocaleString()} FCFA</strong>
      </div>
      ${o.notes?`<div style="margin-top:16px;padding:12px;background:var(--gold-pale);border-radius:8px;font-size:13px"><strong>Notes:</strong> ${o.notes}</div>`:''}
      <div style="margin-top:20px">
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Mettre à jour le statut</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${['confirmed','preparing','ready','delivered','cancelled'].map(s=>`
            <button class="btn-sm ${o.status===s?'btn-sm-green':'btn-sm-edit'}" onclick="updateStatus('${o._id}','${s}');document.getElementById('order-modal').classList.remove('open')">${statusLabels[s]}</button>
          `).join('')}
        </div>
      </div>
    `;
    document.getElementById('order-modal').classList.add('open');
  }

  async function updateStatus(id, status) {
    try {
      await apiFetch(`/orders/${id}/status`, { method:'PUT', body: JSON.stringify({ status }) });
      showToast(`Statut mis à jour: ${statusLabels[status]}`);
      loadOrders();
    } catch(e) { showToast(e.message, 'error'); }
  }

  document.getElementById('order-modal').addEventListener('click', e => { if(e.target === document.getElementById('order-modal')) document.getElementById('order-modal').classList.remove('open'); });
</script>
</body>
</html>
