<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tableau de bord</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
<div id="admin-wrapper" class="admin-layout">
  <!-- Sidebar injected by JS -->
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="sidebar-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">
        <h1>Tableau de bord</h1>
        <p id="topbar-date"></p>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle"></button>
      </div>
    </div>

    <div class="admin-content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
          <div class="stat-info">
            <h4 id="stat-orders">0</h4>
            <p>Commandes totales</p>
          </div>
        </div>
        <div class="stat-card gold">
          <div class="stat-icon gold">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="stat-info">
            <h4 id="stat-revenue">0</h4>
            <p>Chiffre d'affaires (FCFA)</p>
          </div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon red">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="stat-info">
            <h4 id="stat-pending">0</h4>
            <p>En attente</p>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="stat-info">
            <h4 id="stat-clients">0</h4>
            <p>Clients enregistrés</p>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <!-- Recent orders -->
        <div class="admin-card">
          <div class="admin-card-header">
            <h3>Commandes récentes</h3>
            <a href="orders.html" style="font-size:13px;color:var(--green);font-weight:600">Voir tout</a>
          </div>
          <div class="admin-table-wrap">
            <table>
              <thead><tr><th>Client</th><th>Total</th><th>Statut</th></tr></thead>
              <tbody id="recent-orders-table"></tbody>
            </table>
          </div>
        </div>
        <!-- Quick actions -->
        <div class="admin-card">
          <div class="admin-card-header"><h3>Actions rapides</h3></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <a href="heroes.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--green-pale);border-radius:10px;text-decoration:none;color:var(--green-dark);transition:all 0.2s" onmouseover="this.style.background='var(--green)';this.style.color='#fff'" onmouseout="this.style.background='var(--green-pale)';this.style.color='var(--green-dark)'">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span style="font-size:13px;font-weight:600">Ajouter Hero</span>
            </a>
            <a href="menus.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--gold-pale);border-radius:10px;text-decoration:none;color:#7B5E00;transition:all 0.2s" onmouseover="this.style.background='var(--gold)';this.style.color='#000'" onmouseout="this.style.background='var(--gold-pale)';this.style.color='#7B5E00'">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
              <span style="font-size:13px;font-weight:600">Nouveau plat</span>
            </a>
            <a href="events.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:#E3F2FD;border-radius:10px;text-decoration:none;color:#1565C0;transition:all 0.2s" onmouseover="this.style.background='#1565C0';this.style.color='#fff'" onmouseout="this.style.background='#E3F2FD';this.style.color='#1565C0'">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span style="font-size:13px;font-weight:600">Événement</span>
            </a>
            <a href="users.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:#FFEBEE;border-radius:10px;text-decoration:none;color:#C62828;transition:all 0.2s" onmouseover="this.style.background='#E53935';this.style.color='#fff'" onmouseout="this.style.background='#FFEBEE';this.style.color='#C62828'">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span style="font-size:13px;font-weight:600">Valider clients</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/admin-layout.js"></script>
<script>
  initAdminLayout('dashboard');
  loadDashboard();

  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  async function loadDashboard() {
    try {
      const [orders, users] = await Promise.all([apiFetch('/orders/admin/all'), apiFetch('/users/admin/all')]);
      document.getElementById('stat-orders').textContent = orders.length;
      document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;
      document.getElementById('stat-clients').textContent = users.length;
      const revenue = Number(orders.filter(o => o.status === 'delivered').reduce((s, o) => s + Number(o.totalAmount || 0), 0)) || 0;
      document.getElementById('stat-revenue').textContent = revenue.toLocaleString();
      // Recent orders
      const tbody = document.getElementById('recent-orders-table');
      const statusLabels = { pending:'En attente', confirmed:'Confirmé', preparing:'En préparation', ready:'Prêt', delivered:'Livré', cancelled:'Annulé' };
      const statusClass = { pending:'status-pending', confirmed:'status-confirmed', preparing:'status-preparing', ready:'status-ready', delivered:'status-delivered', cancelled:'status-cancelled' };
      tbody.innerHTML = orders.slice(0,8).map(o => `<tr>
        <td><strong>${o.customerName}</strong><br><span style="font-size:12px;color:var(--gray)">${o.customerPhone}</span></td>
        <td style="font-weight:700;color:var(--green-dark)">${o.totalAmount.toLocaleString()} FCFA</td>
        <td><span class="status-badge ${statusClass[o.status]||''}">${statusLabels[o.status]||o.status}</span></td>
      </tr>`).join('');
    } catch(e) { console.error(e); }
  }
</script>
</body>
</html>
