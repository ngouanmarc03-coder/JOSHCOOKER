<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Josua Cooker</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="../index.html">
    <img src="../images/logo.png" alt="Josua Cooker" style="height:36px;width:auto;display:block">
  </a>
  <button class="hamburger"><span></span><span></span><span></span></button>
  <div class="navbar-nav">
    <a href="../index.html">Accueil</a>
    <a href="menu.html">Menu</a>
    <a href="contact.html">Contact</a>
    <button class="theme-toggle"></button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:64px;height:64px;background:var(--green-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2>Josua Cooker</h2>
      <p>Connectez-vous ou créez votre compte</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div id="login-alert"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="login-password" placeholder="••••••••">
          <button onclick="togglePassword('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="doLogin()" id="btn-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Se connecter
      </button>
      <div style="margin-top:16px;padding:12px;background:var(--gold-pale);border-radius:8px;font-size:13px;color:#7B5E00">
        <strong>Admin:</strong> admin@josuacooker.ci / admin2024
      </div>
    </div>

    <!-- Register -->
    <div id="form-register" style="display:none">
      <div id="register-alert"></div>
      <div class="alert alert-info" style="font-size:13px">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Votre compte sera activé par l'admin avant que vous puissiez commander.
      </div>
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" id="reg-name" placeholder="Jean Kouassi">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="reg-phone" placeholder="+225 07 00 00 00 00">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="reg-password" placeholder="Minimum 6 caractères">
          <button onclick="togglePassword('reg-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="alert alert-info" style="font-size:12px;margin-bottom:16px">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Utilisez le même email et téléphone que ceux de votre dépôt Mobile Money pour la vérification des paiements.
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="doRegister()" id="btn-register">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Créer mon compte
      </button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    window.location.href = user.role === 'admin' ? 'admin/dashboard.html' : 'account.html';
  }

  function switchTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function togglePassword(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showAlert(containerId, msg, type = 'error') {
    document.getElementById(containerId).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('login-alert', 'Veuillez remplir tous les champs.');
    const btn = document.getElementById('btn-login');
    btn.innerHTML = '<span class="loader"></span> Connexion...';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      localStorage.setItem('jc_token', data.token);
      localStorage.setItem('jc_user', JSON.stringify(data.user));
      showToast('Connexion réussie !');
      setTimeout(() => {
        if (data.user.role === 'admin') window.location.href = 'admin/dashboard.html';
        else window.location.href = 'account.html';
      }, 800);
    } catch(e) {
      showAlert('login-alert', e.message);
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Se connecter`;
      btn.disabled = false;
    }
  }

  async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !phone || !password) return showAlert('register-alert', 'Veuillez remplir tous les champs.');
    if (password.length < 6) return showAlert('register-alert', 'Le mot de passe doit faire au moins 6 caractères.');
    const btn = document.getElementById('btn-register');
    btn.innerHTML = '<span class="loader"></span> Création...';
    btn.disabled = true;
    try {
      await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, phone, password }) });
      showAlert('register-alert', 'Compte créé ! En attente de validation par l\'admin. Vous serez notifié.', 'success');
      btn.innerHTML = 'Compte créé !';
    } catch(e) {
      showAlert('register-alert', e.message);
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Créer mon compte`;
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if(e.key === 'Enter') { const tab = document.getElementById('tab-login').classList.contains('active') ? 'login' : 'register'; tab === 'login' ? doLogin() : doRegister(); } });
</script>
</body>
</html>
